
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Animation Studio</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Animation Studio</h1>
      <div class="toolbar">
        <button id="pencilBtn" class="tool-btn active">✏️ Pencil</button>
        <button id="eraserBtn" class="tool-btn">🧹 Eraser</button>
        <button id="clearBtn" class="tool-btn">🗑️ Clear</button>
        <input type="color" id="colorPicker" value="#000000">
        <input type="range" id="brushSize" min="1" max="20" value="3">
        <span id="brushSizeLabel">3px</span>
      </div>
      <div class="file-controls">
        <button id="cloudSaveBtn">☁️ Save to Cloud</button>
        <button id="cloudLoadBtn">☁️ Load from Cloud</button>
        <button id="downloadBtn">💾 Download Project</button>
        <button id="loadBtn">📂 Load Project</button>
        <button id="exportBtn">📥 Export GIF</button>
      </div>
    </header>

    <main>
      <div class="sidebar">
        <h3>Insert</h3>
        <div class="insert-tools">
          <button id="uploadImageBtn" class="insert-btn">📷 Upload Image</button>
          <input type="file" id="imageUpload" accept="image/*" style="display: none;">
          <button id="circleBtn" class="insert-btn">⭕ Circle</button>
          <button id="squareBtn" class="insert-btn">⬜ Square</button>
          <button id="triangleBtn" class="insert-btn">🔺 Triangle</button>
        </div>
        <div class="resize-controls" id="resizeControls" style="display: none;">
          <h4>Resize Shape</h4>
          <label>Width: <input type="number" id="shapeWidth" min="10" max="500" value="100"></label>
          <label>Height: <input type="number" id="shapeHeight" min="10" max="500" value="100"></label>
          <button id="applyResize">Apply</button>
        </div>
      </div>
      
      <div class="canvas-container">
        <canvas id="drawCanvas"></canvas>
      </div>

      <div class="animation-controls">
        <div class="playback">
          <button id="playBtn">▶️ Play</button>
          <button id="stopBtn">⏹️ Stop</button>
          <label>FPS: <input type="number" id="fpsInput" value="12" min="1" max="60"></label>
        </div>

        <div class="frame-controls">
          <button id="addFrameBtn">➕ Add Frame</button>
          <button id="deleteFrameBtn">🗑️ Delete Frame</button>
          <button id="duplicateFrameBtn">📋 Duplicate</button>
          <label>
            <input type="checkbox" id="onionSkin"> Onion Skin
          </label>
        </div>

        <div class="timeline" id="timeline"></div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>

</html>
