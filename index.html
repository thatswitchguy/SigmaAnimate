
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Animation Studio</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Sigma Animate</h1>
      <div class="toolbar">
        <button id="pencilBtn" class="tool-btn active">✎ Pencil</button>
        <button id="smartDrawBtn" class="tool-btn">➤ Mouse</button>
        <button id="fillBtn" class="tool-btn">🪣 Fill</button>
        <button id="eraserBtn" class="tool-btn">🧹 Eraser</button>
        <button id="textBtn" class="tool-btn">T Text</button>
        <button id="clearBtn" class="tool-btn">🗑️ Clear</button>
        <button id="undoBtn" class="tool-btn">↲ Undo</button>
        <button id="redoBtn" class="tool-btn">↳ Redo</button>
        <button id="previewBtn" class="tool-btn">👁️ Preview</button>
        <input type="color" id="colorPicker" value="#000000">
        <input type="range" id="brushSize" min="1" max="20" value="7">
        <span id="brushSizeLabel">7px</span>
        <label>
          <input type="checkbox" id="smartDrawToggle" checked>✦ Smart Draw
        </label>
      </div>
      <div class="file-controls">
        <button id="cloudSaveBtn">💾 Save</button>
        <button id="cloudLoadBtn">📂 Load</button>
        <button id="loadBtn">⬆ Upload</button>
        <button id="uploadAnimationBtn">⬆ Upload Animation</button>
        <input type="file" id="animationUpload" accept="video/webm" style="display: none;">
        <button id="exportBtn">⏭ Export Video</button>
      </div>
    </header>

    <main>
      <div class="content-area">
        <div class="sidebar">
          <button class="collapse-btn" id="sidebarCollapseBtn">◀</button>
          <div class="resizer" id="sidebarResizer"></div>
          <h3>Insert</h3>
          <div class="insert-tools">
            <button id="uploadImageBtn" class="insert-btn">⬆ Upload Image</button>
            <input type="file" id="imageUpload" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp,image/bmp,image/svg+xml" style="display: none;">
            <button id="circleBtn" class="insert-btn">⏺ Circle</button>
            <button id="squareBtn" class="insert-btn">⬜ Square</button>
            <button id="triangleBtn" class="insert-btn">▲ Triangle</button>
            <button id="lineBtn" class="insert-btn">📏 Line</button>
          </div>
          <div class="resize-controls" id="resizeControls" style="display: none;">
            <h4>Resize Shape</h4>
            <label>Width: <input type="number" id="shapeWidth" min="10" max="500" value="100"></label>
            <label>Height: <input type="number" id="shapeHeight" min="10" max="500" value="100"></label>
            <button id="applyResize">Apply</button>
          </div>
          
          <div class="selection-controls" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #444;">
            <h4>Selection</h4>
            <button id="groupBtn" class="insert-btn">🔳 Group</button>
            <button id="ungroupBtn" class="insert-btn">🔓 Ungroup</button>
            <button id="deleteSelectedBtn" class="insert-btn">⌫ Delete</button>
            <button id="copyBtn" class="insert-btn">📋 Copy (Ctrl+C)</button>
            <button id="pasteBtn" class="insert-btn">📄 Paste (Ctrl+V)</button>
            <button id="duplicateBtn" class="insert-btn">⿻ Duplicate (Ctrl+D)</button>
            <button id="renameBtn" class="insert-btn">✎ Rename</button>
            <div style="margin-top: 10px;">
              <label style="display: block;">Rotate: <input type="range" id="rotationInput" min="0" max="360" value="0" style="width: 100%;"></label>
              <span id="rotationValue" style="font-size: 12px; color: #aaa;">0°</span>
            </div>
          </div>
          
          <div class="background-controls" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #444;">
            <h4>Background</h4>
            <label style="display: block; margin-bottom: 8px;">
              Color: <input type="color" id="backgroundColorPicker" value="#ffffff">
            </label>
            <button id="uploadBackgroundBtn" class="insert-btn">⬆ Upload Background</button>
            <input type="file" id="backgroundUpload" accept="image/*" style="display: none;">
            <button id="clearBackgroundBtn" class="insert-btn">🗑️ Clear Background</button>
          </div>
        </div>
        
        <div class="canvas-container">
          <canvas id="drawCanvas"></canvas>
        </div>
      </div>

      <div class="animation-controls">
        <button class="collapse-btn" id="animationCollapseBtn">▼</button>
        <div class="resizer-horizontal" id="animationResizer"></div>
        <div class="playback">
          <button id="playBtn">▶ Play</button>
          <button id="stopBtn">⏸ Stop</button>
          <label>FPS: <input type="number" id="fpsInput" value="12" min="1" max="60"></label>
        </div>

        <div class="frame-controls">
          <button id="addFrameBtn">+ Add Frame</button>
          <button id="deleteFrameBtn">⌫ Delete Frame</button>
          <button id="duplicateFrameBtn">⿻ Duplicate</button>
          <label>
            <input type="checkbox" id="onionSkin">▒ Onion Skin
          </label>
        </div>

        <div class="timeline" id="timeline"></div>
      </div>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>

</html>
